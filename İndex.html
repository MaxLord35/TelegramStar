<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Yıldız Paneli</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #uyari { display: none; margin-top: 20px; background: #ef4444; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Telegram Yıldız Paneli</h2>
        <p style="font-size: 12px; color: #94a3b8;">Ücretsiz ve Şifresiz Gönderim</p>
        <input type="text" placeholder="Kullanıcı Adı veya ID">
        <input type="number" placeholder="Yıldız Miktarı (Maks. 10.000)">
        <button onclick="goster()">BAŞLAT</button>
        <div id="uyari">
            ⚠️ DİKKAT: Böyle şeylere inanmayın! Kimse kimseye bedava değerli bir şey vermez. Bu tarz siteler sizi aldatmak için kurulur.
        </div>
    </div>
    <script>
        function goster() {
            alert("DURUN! ÖNEMLİ BİR UYARI VAR.");
            document.getElementById('uyari').style.display = 'block';
        }
    </script>
</body>
</html>
